<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wild Work — Knowledge Base</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Wild Work Knowledge Base">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .sidebar-nav li { font-weight: bold; color: black; }
    .sidebar-nav a { color: black !important; font-weight: bold !important; }
    .app-name-link {
      color: black !important; font-weight: bold !important; font-size: 1em !important;
      background-color: #80C0FF; padding: 4px 10px; border-radius: 6px; display: inline-block;
    }
    .sidebar-nav ul ul { padding-left: 12px !important; }
    .sidebar-nav ul ul ul { padding-left: 12px !important; }
    @media (min-width: 769px) { .sidebar-toggle { display: none !important; } }
    @media (max-width: 768px) { #sidebar-toggle-btn { display: none !important; } }
    #sidebar-toggle-btn {
      position: fixed; top: 15px; left: 15px; z-index: 1000;
      background-color: #e9ecef; border: 1px solid #ccc; border-radius: 6px;
      padding: 6px 10px; cursor: pointer; font-size: 1.2em; font-weight: bold; color: #333;
    }
    body.close #sidebar-toggle-btn { left: 5px; }
    @media (max-width: 768px) {
      img[src="../images/wl45.png"] { width: 100% !important; max-width: 100% !important; }
      .ecom-gallery { flex-direction: column !important; }
      .ecom-gallery > div { width: 100% !important; flex: 0 0 auto !important; margin-bottom: 15px; }
      .ecom-text { order: 2 !important; }
    }
  </style>
</head>
<body>
  <button id="sidebar-toggle-btn" title="Toggle sidebar">☰</button>
  <div style="position: fixed; top: 15px; right: 15px; z-index: 1000; font-size: 1em;">
    <a href="/" style="text-decoration: none; padding: 6px 10px; background-color: #e9ecef; border-radius: 6px; color: black; font-weight: bold;">RU</a>
    <span style="margin: 0 3px; color: #999;">|</span>
    <a href="/en/" style="text-decoration: none; padding: 6px 10px; background-color: #d1ecf1; border-radius: 6px; color: black; font-weight: bold;">EN</a>
  </div>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Wild Work EN',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('sidebar-toggle-btn');
      if (btn) {
        btn.addEventListener('click', function() { document.body.classList.toggle('close'); });
      }
    });
  </script>
</body>
</html>
